<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator in js</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(120deg, #ff9a9e, #fad0c4, #fbc2eb, #a18cd1);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        h2 {
            color: #fff; 
            text-align: center; 
            margin: 0;
            font-size: 26px;
        }
        .calculator {
            background-color: #1e1e2f;
            width: 250px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            padding: 30px;
            border-radius: 12px;
        }
        input {
            width: 100%;
            height: 35px;
            margin: 12px 0;
            font-size: 22px;
            border: none;
            outline: none;
            padding: 10px;
            border-radius: 10px;
            text-align: right;
        }
        .row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
        }
        button {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #3a3a4f;
            color: #fff;
            transition: 0.2s;
        }
        button:hover {
            background: #5a5af0;
            transform: scale(1);
        }
        .operator {
            background: #ff7a18;
        }
        .operator:hover {
            background: #ff9a3c;
        }
        .equal {
            background: #00c9a7;
            width: 95px;
        }
        .equal:hover {
            background: #00e0b8;
        }
        .clear {
            background: #ff4b5c;
        }
        .clear:hover {
            background: #ff6b7a;
        }
        .delete {
            background: rgb(245, 18, 18);
        }
        .delete:hover {
            background: rgb(170, 18, 18);
        }
    </style>
</head>
<body>
    <div class="calculator">
        <h2>Calculator</h2>
        <input type="text" name="input" id="input">
        <div class="row">
            <button type="button" class="clear" onclick="clearInput()">C</button>
            <button type="button" class="operator" onclick="appendValue('/')">/</button>
            <button type="button" class="operator" onclick="appendValue('*')">*</button>
            <button type="button" class="delete" onclick="deleteData()">DEL</button>
        </div>
        <div class="row">
            <button type="button" onclick="appendValue('7')">7</button>
            <button type="button" onclick="appendValue('8')">8</button>
            <button type="button" onclick="appendValue('9')">9</button>
            <button type="button" class="operator" onclick="appendValue('-')">-</button>
        </div>
        <div class="row">
            <button type="button" onclick="appendValue('4')">4</button>
            <button type="button" onclick="appendValue('5')">5</button>
            <button type="button" onclick="appendValue('6')">6</button>
            <button type="button" class="operator" onclick="appendValue('+')">+</button>
        </div>
        <div class="row">
            <button type="button" onclick="appendValue('1')">1</button>
            <button type="button" onclick="appendValue('2')">2</button>
            <button type="button" onclick="appendValue('3')">3</button>
            <button type="button" onclick="appendValue('.')">.</button>
        </div>
        <div class="row">
            <button type="button" onclick="appendValue('0')">0</button>
            <button type="button" class="equal" onclick="calculate()">=</button>
        </div>
    </div>
    <script>
        const input = document.getElementById("input");
        function appendValue(num) {
            input.value+=num;
        }
        function calculate() {
            input.value = eval(input.value);
            // 9 = 4+5;
        }
        function deleteData() {
            input.value = input.value.slice(0,-1);
        }
        function clearInput() {
            input.value="";
        }
    </script>
</body>
</html>
