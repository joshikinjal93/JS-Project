<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo List</title>
<style>
    body {
        font-family: Arial, Helvetica, sans-serif;
        background-color: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 150px;
    }
    .container {
        background-color: #fff;
        padding: 35px;
        border-radius: 12px;
        width: 300px;
        box-shadow: 0 0px 10px rgba(0, 0, 0, 0.5);
    }
    h2 {
        text-align: center;
        margin-bottom: 16px;
    }
    .input-area {
        display: flex;
        gap: 10px;
        margin-bottom: 14px;
    }
    input {
        flex: 1;
        padding: 8px;
        border: 1px solid #ccc;
        outline: none;
    }
    input:focus {
        border: 1px solid blue;
    }
    button {
        padding: 8px 16px;
        background-color: #2575fc;
        color: #fff;
        cursor: pointer;
        border: none;
    }
    button:hover {
        background-color: #2f5492;
    }
    li {
        cursor: pointer;
    }
</style>
</head>
<body>
<div class="container">
    <h2>Todo List</h2>

    <div class="input-area">
        <input type="text" id="inputBox" placeholder="Enter Task">
        <button type="button" onclick="addTask()">Add</button>
    </div>
    <ul id="taskList"></ul>
</div>

<script>
function addTask() {
    let inputVal = document.getElementById("inputBox");
    let text = inputVal.value.trim();

    if(text === "") return;

    let liItem = document.createElement("li");
    liItem.textContent = text;

    liItem.onclick = function() {
        this.remove();
    }

    document.getElementById("taskList").appendChild(liItem);
    inputVal.value = "";
}
</script>
</body>
</html>
